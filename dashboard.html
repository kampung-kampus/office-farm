<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farm Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:0;
}

.header{
background:#2c7a3f;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
padding:15px;
}

.card{
background:white;
border-radius:10px;
padding:15px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.02);
}

.plot{
font-weight:bold;
font-size:18px;
color:#2c7a3f;
}

.status{
display:inline-block;
padding:4px 10px;
border-radius:15px;
color:white;
font-size:12px;
margin-top:5px;
}

.growing{ background:#2ecc71; }
.soon{ background:#f39c12; }
.ready{ background:#e74c3c; }

.small{
font-size:13px;
color:#555;
margin-top:4px;
}

</style>

</head>

<body>

<div class="header">🌿 Farm Dashboard</div>

<div class="grid" id="grid"></div>

<script>

const DATA_URL = "data/farm.json?v=" + new Date().getTime();

function getStatus(harvest){

const today = new Date();
const h = new Date(harvest + "T00:00:00");

const diff = Math.floor((h - today)/(1000*60*60*24));

if(diff <= 0) return {text:"Harvest Ready", class:"ready"};
if(diff <= 7) return {text:"Fertilize Soon", class:"soon"};
return {text:"Growing", class:"growing"};

}

async function loadDashboard(){

const res = await fetch(DATA_URL);
const farm = await res.json();

const grid = document.getElementById("grid");

Object.keys(farm).forEach(plot => {

const data = farm[plot];

const status = getStatus(data.estHarvest);

const card = document.createElement("div");
card.className = "card";

card.onclick = () => {
window.location.href = "index.html?plot=" + plot;
};

card.innerHTML = `
<div class="plot">${plot}</div>
<div>${data.plant}</div>

<div class="status ${status.class}">
${status.text}
</div>

<div class="small">👨‍🌾 ${data.staff}</div>
<div class="small">📅 Planted: ${data.datePlanted}</div>
<div class="small">🌾 Harvest: ${data.estHarvest}</div>
`;

grid.appendChild(card);

});

}

loadDashboard();

</script>

</body>

</html>
